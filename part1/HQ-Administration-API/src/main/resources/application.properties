spring.application.name=HQ-Administration-API

# --- Datasource (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3306/safe_dispatch_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Run data.sql AFTER Hibernate creates tables
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# --- HTTPS ---
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keys.jks
server.ssl.key-store-password=password
server.ssl.key-store-type=JKS
server.ssl.key-alias=hqadmin